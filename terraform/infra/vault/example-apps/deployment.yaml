apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
  labels:
    app: example-app
spec:
  selector:
    matchLabels:
      app: example-app
  replicas: 1
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/tls-skip-verify: "true"
        vault.hashicorp.com/agent-inject-secret-application.properties: "secret/databases/example-service"
        vault.hashicorp.com/agent-inject-template-application.properties: |-
          {{`{{- with secret "secret/databases/example-service" -}}`}}
          {{`{{- range $k, $v := .Data.data }}`}}
          {{`{{$k}}={{$v}}`}}          
          {{`{{- end }}`}}
          {{`{{ end }}`}}
        vault.hashicorp.com/role: "my-secret-role"
      labels:
        app: example-app
    spec:
      serviceAccountName: my-secret-account
      containers:
        - name: app
          image: jweissig/app:0.0.1
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-secret-account
#  labels:
#    app: example-app